<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LINE 登入中...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9fafb; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader" style="margin: 0 auto 15px;"></div>
        <p>正在連繫 LINE，請稍候...</p>
    </div>

    <script>
        // 1. 從網址抓取 LINE 回傳的 Code
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
            // 將 code 存入暫存，並跳回首頁
            // 在實際開發中，這裡通常會呼叫 API 換取 User ID
            // 為了簡化，我們暫時將 code 存起來，回到首頁由 React 處理
            sessionStorage.setItem('line_auth_code', code);
            window.location.href = '/'; 
        } else {
            document.body.innerHTML = '登入失敗，請重新嘗試。';
        }
    </script>
</body>
</html>
